      height: 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #071f32;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      margin-top: 28px;
      padding: 6px 14px;
      background: #e8f4ff;
      color: #2399f9;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
